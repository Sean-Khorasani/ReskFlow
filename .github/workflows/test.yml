name: Comprehensive Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - performance
          - security
          - e2e
          - chaos

jobs:
  # Unit and Integration Tests for Services
  test-services:
    name: Test ${{ matrix.service }} Service
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'unit' || github.event.inputs.test_type == 'integration'
    strategy:
      matrix:
        service: [user, payment, order, delivery, notification, gateway]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      
      - name: Test ${{ matrix.service }} service
        run: |
          service_path="backend/services/${{ matrix.service }}"
          if [ -d "$service_path" ] && [ -f "$service_path/package.json" ]; then
            cd "$service_path"
            npm ci || npm install
            
            # Generate Prisma client if needed
            if [ -f "../../shared/prisma/schema.prisma" ]; then
              cd ../../shared
              npx prisma generate
              cd "../services/${{ matrix.service }}"
            fi
            
            # Run tests
            npm run test:unit || echo "Unit tests pending"
            npm run test:integration || echo "Integration tests pending"
          else
            echo "Service not yet implemented"
          fi
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret
      
      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/services/${{ matrix.service }}/coverage/lcov.info
          flags: ${{ matrix.service }}-service
          name: ${{ matrix.service }}-coverage

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'performance'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup K6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Start services
        run: docker-compose up -d
      
      - name: Wait for services
        run: |
          chmod +x ./scripts/wait-for-services.sh
          ./scripts/wait-for-services.sh
      
      - name: Run performance tests
        run: |
          cd testing/performance
          ./run-performance-tests.sh
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: testing/performance/results/

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'security'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run OWASP ZAP scan
        run: |
          docker run -v $(pwd):/zap/wrk/:rw \
            -t owasp/zap2docker-stable zap-baseline.py \
            -t https://localhost:3000 \
            -r zap-report.html
      
      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: zap-report.html

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Start services
        run: docker-compose up -d
      
      - name: Run E2E tests
        run: npm run test:e2e
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  chaos-tests:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'chaos'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Kubernetes cluster
        uses: medyagh/setup-minikube@master
      
      - name: Deploy application
        run: |
          kubectl apply -f k8s/
          kubectl wait --for=condition=ready pod -l app=api-gateway --timeout=300s
      
      - name: Install Litmus
        run: |
          kubectl apply -f https://litmuschaos.github.io/litmus/litmus-operator-v3.0.0.yaml
          kubectl get pods -n litmus
      
      - name: Run chaos experiments
        run: |
          cd testing/chaos
          ./run-chaos-tests.sh
      
      - name: Generate chaos report
        run: |
          kubectl logs -n litmus -l app.kubernetes.io/component=chaos-exporter > chaos-report.log
      
      - name: Upload chaos results
        uses: actions/upload-artifact@v3
        with:
          name: chaos-results
          path: chaos-report.log

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-services, performance-tests, security-tests, e2e-tests, chaos-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Generate summary report
        run: |
          echo "# Test Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Service Tests: ${{ needs.test-services.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Performance Tests: ${{ needs.performance-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Tests: ${{ needs.security-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Chaos Tests: ${{ needs.chaos-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage Reports" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports have been uploaded to Codecov for each service." >> $GITHUB_STEP_SUMMARY