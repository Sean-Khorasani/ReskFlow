name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: delivery-platform
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME }}

jobs:
  prepare-deployment:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.set-version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      
      - name: Set version
        id: set-version
        run: |
          echo "version=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: prepare-deployment
    environment: ${{ needs.prepare-deployment.outputs.environment }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.5
      
      - name: Terraform Init
        run: |
          cd infrastructure/terraform
          terraform init -backend-config="key=${{ needs.prepare-deployment.outputs.environment }}/terraform.tfstate"
      
      - name: Terraform Plan
        run: |
          cd infrastructure/terraform
          terraform plan -var-file="environments/${{ needs.prepare-deployment.outputs.environment }}.tfvars" -out=tfplan
      
      - name: Terraform Apply
        if: needs.prepare-deployment.outputs.environment == 'production'
        run: |
          cd infrastructure/terraform
          terraform apply -auto-approve tfplan

  deploy-services:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: [prepare-deployment, deploy-infrastructure]
    environment: ${{ needs.prepare-deployment.outputs.environment }}
    strategy:
      matrix:
        service: [gateway, delivery, payment, tracking, optimization, security, notification]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-${{ needs.prepare-deployment.outputs.environment }}
      
      - name: Deploy to Kubernetes
        run: |
          # Update image tag
          sed -i "s|IMAGE_TAG|${{ needs.prepare-deployment.outputs.version }}|g" infrastructure/kubernetes/${{ matrix.service }}/deployment.yaml
          
          # Apply Kubernetes manifests
          kubectl apply -f infrastructure/kubernetes/${{ matrix.service }}/
          
          # Wait for rollout
          kubectl rollout status deployment/${{ matrix.service }}-deployment -n delivery-platform --timeout=5m
      
      - name: Run smoke tests
        run: |
          # Wait for service to be ready
          sleep 30
          
          # Run health check
          SERVICE_URL=$(kubectl get service ${{ matrix.service }}-service -n delivery-platform -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f http://$SERVICE_URL/health || exit 1

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [prepare-deployment, deploy-services]
    environment: ${{ needs.prepare-deployment.outputs.environment }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Build Admin Dashboard
        run: |
          cd frontend/admin
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_ENVIRONMENT: ${{ needs.prepare-deployment.outputs.environment }}
      
      - name: Deploy to S3/CloudFront
        run: |
          aws s3 sync frontend/admin/out/ s3://delivery-admin-${{ needs.prepare-deployment.outputs.environment }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  deploy-mobile:
    name: Deploy Mobile Apps
    runs-on: ubuntu-latest
    needs: [prepare-deployment, deploy-services]
    if: needs.prepare-deployment.outputs.environment == 'production'
    strategy:
      matrix:
        app: [driver, customer]
        platform: [ios, android]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd mobile/${{ matrix.app }}
          npm ci
      
      - name: Build Android
        if: matrix.platform == 'android'
        run: |
          cd mobile/${{ matrix.app }}
          cd android
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      
      - name: Upload to Play Store
        if: matrix.platform == 'android'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.delivery.${{ matrix.app }}
          releaseFiles: mobile/${{ matrix.app }}/android/app/build/outputs/apk/release/*.apk
          track: internal
      
      - name: Build iOS
        if: matrix.platform == 'ios' && runner.os == 'macOS'
        run: |
          cd mobile/${{ matrix.app }}/ios
          pod install
          xcodebuild -workspace ${{ matrix.app }}.xcworkspace -scheme ${{ matrix.app }} -configuration Release archive -archivePath build/${{ matrix.app }}.xcarchive
          xcodebuild -exportArchive -archivePath build/${{ matrix.app }}.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build/
      
      - name: Upload to TestFlight
        if: matrix.platform == 'ios' && runner.os == 'macOS'
        run: |
          xcrun altool --upload-app -f "mobile/${{ matrix.app }}/ios/build/${{ matrix.app }}.ipa" -u ${{ secrets.APPLE_ID }} -p ${{ secrets.APPLE_APP_PASSWORD }}

  run-e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-frontend]
    environment: ${{ needs.prepare-deployment.outputs.environment }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd tests/e2e
          npm ci
      
      - name: Run E2E tests
        run: |
          cd tests/e2e
          npm run test:ci
        env:
          BASE_URL: ${{ secrets.API_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-results
          path: tests/e2e/results/

  post-deployment:
    name: Post Deployment
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-frontend, run-e2e-tests]
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment to ${{ needs.prepare-deployment.outputs.environment }} completed
            Version: ${{ needs.prepare-deployment.outputs.version }}
            Status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Create deployment record
        run: |
          curl -X POST ${{ secrets.API_URL }}/api/deployments \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "${{ needs.prepare-deployment.outputs.environment }}",
              "version": "${{ needs.prepare-deployment.outputs.version }}",
              "status": "${{ job.status }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'
      
      - name: Update status page
        if: needs.prepare-deployment.outputs.environment == 'production'
        run: |
          # Update status page with deployment info
          echo "Deployment completed"

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [prepare-deployment, run-e2e-tests]
    if: failure() && needs.prepare-deployment.outputs.environment == 'production'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Rollback Kubernetes deployments
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-production
          
          # Rollback each service
          for service in gateway delivery payment tracking optimization security notification; do
            kubectl rollout undo deployment/${service}-deployment -n delivery-platform
          done
      
      - name: Send alert
        run: |
          # Send PagerDuty alert
          echo "Rollback initiated for production deployment"