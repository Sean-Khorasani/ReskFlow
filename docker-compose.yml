version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: delivery-postgres
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery123
      POSTGRES_DB: delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - delivery-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: delivery-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - delivery-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: delivery-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: delivery
      MONGO_INITDB_ROOT_PASSWORD: delivery123
      MONGO_INITDB_DATABASE: delivery
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - delivery-network

  # Kafka Message Queue
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: delivery-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - delivery-network

  # Zookeeper (for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: delivery-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - delivery-network

  # Elasticsearch (for logging and search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: delivery-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - delivery-network

  # Kibana (for log visualization)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: delivery-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - delivery-network

  # IPFS Node
  ipfs:
    image: ipfs/go-ipfs:latest
    container_name: delivery-ipfs
    environment:
      IPFS_PROFILE: server
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
    networks:
      - delivery-network

  # Ganache (Local Blockchain)
  ganache:
    image: trufflesuite/ganache:latest
    container_name: delivery-ganache
    ports:
      - "8545:8545"
    command: ["-h", "0.0.0.0", "--deterministic", "--accounts", "10", "--mnemonic", "candy maple cake sugar pudding cream honey rich smooth crumble sweet treat"]
    networks:
      - delivery-network

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: delivery-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - delivery-network

  # Grafana (Metrics Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: delivery-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - delivery-network

  # AI Recommendation Service
  ai-recommendation:
    build:
      context: ./backend/services/ai-recommendation
      dockerfile: Dockerfile
    container_name: delivery-ai-recommendation
    depends_on:
      - postgres
      - redis
      - mongodb
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://delivery:delivery123@postgres:5432/delivery
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://delivery:delivery123@mongodb:27017/delivery
    ports:
      - "3013:3013"
    volumes:
      - ./backend/services/ai-recommendation:/app
      - /app/node_modules
    networks:
      - delivery-network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  elasticsearch_data:
  ipfs_staging:
  ipfs_data:
  prometheus_data:
  grafana_data:

networks:
  delivery-network:
    driver: bridge